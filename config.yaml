audio:
  channels: 1
  chunk_size: 1024
  device_index: null
  sample_rate: 16000
  save_audio: false
hotkey:
  combination: ctrl+space
  mode: push_to_talk
injection:
  keystroke_delay: 0.01
  method: typewrite
llm:
  enabled: true
  engine: llamacpp
  max_tokens: 512
  model_path: models/llm/model.gguf
  n_ctx: 2048
  n_gpu_layers: 0
  prompt_template: default
  temperature: 0.3
logging:
  level: INFO
  log_file: logs/voiceflow.log
  retention: 3
  rotation: 10 MB
stt:
  compute_type: auto
  device: auto
  engine: faster_whisper
  language: null
  model_path: null
  model_size: base
ui:
  show_notifications: true
  show_tray: true
vad:
  enabled: true
  min_speech_duration_ms: 250
  padding_ms: 300
  threshold: 0.5
