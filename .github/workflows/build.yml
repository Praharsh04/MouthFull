name: CI / CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  release:
    types: [created]

jobs:
  test:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]
    - name: Run Tests
      run: |
        pytest tests/

  build-windows:
    needs: test
    runs-on: windows-latest
    if: github.event_name == 'release' || github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pyinstaller
    - name: Build Executable
      run: |
        pyinstaller --noconfirm --windowed --name VoiceFlowLocal src/voiceflow/__main__.py
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: VoiceFlowLocal-Windows
        path: dist/VoiceFlowLocal.exe
