name: CI / CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  release:
    types: [created]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    - name: Run Tests
      run: |
        # pytest tests/ (Tests not fully implemented yet)
        echo "Skipping tests for now"
    - name: Build Executable
      run: |
        python scripts/build.py --config Release
    - name: Build Installer
      run: |
        iscc installer.iss
    - name: Create Portable ZIP
      run: |
        Compress-Archive -Path dist/Release/VoiceFlow/* -DestinationPath release/VoiceFlow_Local_Portable.zip
    - name: Upload Artifacts
      if: github.event_name != 'release'
      uses: actions/upload-artifact@v4
      with:
        name: VoiceFlow-Release
        path: |
          release/VoiceFlow_Local_Setup.exe
          release/VoiceFlow_Local_Portable.zip
    - name: Publish Release Assets
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v1
      with:
        files: |
          release/VoiceFlow_Local_Setup.exe
          release/VoiceFlow_Local_Portable.zip
