<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Voice Orb</title>
<style>
  :root {
    --bg: #0a0a0f;
    --orb-a: #4f7cff;   /* electric blue  */
    --orb-b: #9b5cff;   /* violet         */
    --orb-c: #ff4fd8;   /* magenta pop    */
    --highlight: rgba(255, 255, 255, 0.55);
  }

  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
  }

  .stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }

  #orb-container {
    position: relative;
    width: 220px;
    height: 220px;
  }
  
  #app-icon {
    position: absolute;
    bottom: -20px;
    width: 24px;
    height: 24px;
    border-radius: 4px;
    background-size: cover;
    z-index: 10;
  }
  
  #status-text {
    position: absolute;
    bottom: -40px;
    color: white;
    font-size: 14px;
    font-weight: 600;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    z-index: 10;
    text-align: center;
    width: 100%;
  }

  #orb-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  /* ---- demo controls: delete this whole block when embedding ---- */
  .demo {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .demo button {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    color: #cfcfe0;
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 12px;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .demo button:hover { background: rgba(255,255,255,0.12); color: #fff; }
  .demo button.active { background: var(--orb-b); color: #0a0a0f; border-color: transparent; }
  .demo input[type="range"] { width: 160px; accent-color: var(--orb-a); }
  .demo label { color: #7c7c8e; font-size: 11px; display: flex; align-items: center; gap: 8px; }
  /* ---------------------------------------------------------------- */
</style>
</head>
<body>

<div class="stage">
  <div id="orb-container">
    <canvas id="orb-canvas"></canvas>
    <div id="app-icon"></div>
    <div id="status-text">Idle</div>
  </div>

  <!-- demo controls: delete when embedding -->
  <div class="demo">
    <button data-state="idle" class="active">Idle</button>
    <button data-state="listening">Listening</button>
    <button data-state="speaking">Speaking</button>
    <button data-state="thinking">Thinking</button>
  </div>
  <label>Mic level<input id="level" type="range" min="0" max="100" value="0"></label>
</div>

<script>
/* =========================================================================
   VoiceOrb — minimal, audio-reactive orb for voice-agent UIs
   No dependencies. Drop this <script> block + canvas markup into any page.

   Usage:
     const orb = new VoiceOrb(document.getElementById('orb-container'));
     orb.setState('listening');   // 'idle' | 'listening' | 'speaking' | 'thinking'
     orb.setLevel(0.6);           // 0..1, feed from your audio amplitude/RMS
     orb.destroy();               // stop animation loop
   ========================================================================= */

class VoiceOrb {
  constructor(container, opts = {}) {
    this.container = container;
    this.canvas = container.querySelector('canvas') || document.createElement('canvas');
    if (!this.canvas.parentNode) container.appendChild(this.canvas);
    this.ctx = this.canvas.getContext('2d');

    this.colors = Object.assign({
      a: '#4f7cff',
      b: '#9b5cff',
      c: '#ff4fd8',
      highlight: 'rgba(255,255,255,0.55)'
    }, opts.colors);

    this.state = 'idle';
    this.level = 0;          // instantaneous input level, 0..1
    this._smoothLevel = 0;   // eased level actually used for rendering
    this.t = 0;

    this._resize();
    this._onResize = () => this._resize();
    window.addEventListener('resize', this._onResize);

    this._raf = requestAnimationFrame((ts) => this._loop(ts));
  }

  setState(state) {
    if (['idle', 'listening', 'speaking', 'thinking'].includes(state)) {
      this.state = state;
      const textMap = {
        'idle': '',
        'listening': 'Listening...',
        'speaking': 'Ready!',
        'thinking': 'Processing...'
      };
      document.getElementById('status-text').innerText = textMap[state];
    }
  }

  setIcon(base64Image) {
    const iconEl = document.getElementById('app-icon');
    if (base64Image) {
      iconEl.style.backgroundImage = `url(data:image/png;base64,${base64Image})`;
      iconEl.style.display = 'block';
    } else {
      iconEl.style.display = 'none';
    }
  }

  setLevel(level) {
    this.level = Math.max(0, Math.min(1, level));
  }

  destroy() {
    cancelAnimationFrame(this._raf);
    window.removeEventListener('resize', this._onResize);
  }

  _resize() {
    const dpr = window.devicePixelRatio || 1;
    const rect = this.container.getBoundingClientRect();
    this.size = Math.min(rect.width, rect.height) || 220;
    this.canvas.width = this.size * dpr;
    this.canvas.height = this.size * dpr;
    this.canvas.style.width = this.size + 'px';
    this.canvas.style.height = this.size + 'px';
    this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  // cheap value-noise (no deps) — smooth pseudo-random for organic blob edges
  _noise(x) {
    const s = Math.sin(x * 12.9898) * 43758.5453;
    return s - Math.floor(s);
  }
  _smoothNoise(x) {
    const i = Math.floor(x);
    const f = x - i;
    const a = this._noise(i);
    const b = this._noise(i + 1);
    const u = f * f * (3 - 2 * f);
    return a + (b - a) * u;
  }

  _loop(ts) {
    this.t = ts / 1000;
    this._draw();
    this._raf = requestAnimationFrame((ts2) => this._loop(ts2));
  }

  _draw() {
    const { ctx, size, t, state } = this;
    ctx.clearRect(0, 0, size, size);

    const cx = size / 2, cy = size / 2;
    const baseR = size * 0.28;

    let targetLevel = this.level;
    let speed = 1;
    let hueShift = 0;

    if (state === 'idle') {
      targetLevel = 0.12 + 0.05 * Math.sin(t * 1.2);
      speed = 0.4;
    } else if (state === 'listening') {
      speed = 1.1;
    } else if (state === 'speaking') {
      targetLevel = Math.max(this.level, 0.35 + 0.35 * Math.abs(Math.sin(t * 4.5)));
      speed = 1.8;
      hueShift = 18;
    } else if (state === 'thinking') {
      targetLevel = 0.18;
      speed = 0.9;
    }

    this._smoothLevel += (targetLevel - this._smoothLevel) * 0.12;
    const level = this._smoothLevel;

    const radius = baseR * (1 + level * 0.55);

    // --- outer glow ---
    const glowR = radius * (2.2 + level * 0.6);
    const glow = ctx.createRadialGradient(cx, cy, radius * 0.4, cx, cy, glowR);
    glow.addColorStop(0, this._hexA(this.colors.b, 0.35 + level * 0.25));
    glow.addColorStop(1, this._hexA(this.colors.b, 0));
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(cx, cy, glowR, 0, Math.PI * 2);
    ctx.fill();

    // --- rotating processing ring (thinking state) ---
    if (state === 'thinking') {
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(t * 1.6);
      const ringR = radius * 1.35;
      const grad = ctx.createLinearGradient(-ringR, 0, ringR, 0);
      grad.addColorStop(0, this._hexA(this.colors.a, 0));
      grad.addColorStop(0.5, this._hexA(this.colors.a, 0.8));
      grad.addColorStop(1, this._hexA(this.colors.a, 0));
      ctx.strokeStyle = grad;
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.arc(0, 0, ringR, 0, Math.PI * 1.4);
      ctx.stroke();
      ctx.restore();
    }

    // --- listening ripple rings ---
    if (state === 'listening' && level > 0.15) {
      for (let i = 0; i < 2; i++) {
        const phase = (t * 0.9 + i * 0.5) % 1;
        const r = radius * (1 + phase * 1.1);
        const alpha = (1 - phase) * 0.25 * (0.4 + level);
        ctx.strokeStyle = this._hexA(this.colors.a, alpha);
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    // --- core blob (organic edge via value noise) ---
    const points = 48;
    const distortAmp = radius * (0.05 + level * 0.16);
    ctx.beginPath();
    for (let i = 0; i <= points; i++) {
      const theta = (i / points) * Math.PI * 2;
      const n = this._smoothNoise(theta * 2.1 + t * speed * 0.6) - 0.5;
      const r = radius + n * distortAmp;
      const x = cx + Math.cos(theta) * r;
      const y = cy + Math.sin(theta) * r;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath();

    const coreGrad = ctx.createRadialGradient(
      cx - radius * 0.3, cy - radius * 0.35, radius * 0.1,
      cx, cy, radius * 1.1
    );
    coreGrad.addColorStop(0, this._shiftHue(this.colors.a, hueShift));
    coreGrad.addColorStop(0.55, this._shiftHue(this.colors.b, hueShift));
    coreGrad.addColorStop(1, this._shiftHue(this.colors.c, hueShift * (0.5 + level)));
    ctx.fillStyle = coreGrad;
    ctx.fill();

    // --- specular highlight (glass feel) ---
    const hl = ctx.createRadialGradient(
      cx - radius * 0.35, cy - radius * 0.4, 0,
      cx - radius * 0.35, cy - radius * 0.4, radius * 0.6
    );
    hl.addColorStop(0, this.colors.highlight);
    hl.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = hl;
    ctx.beginPath();
    ctx.arc(cx - radius * 0.3, cy - radius * 0.35, radius * 0.55, 0, Math.PI * 2);
    ctx.fill();
  }

  _hexA(hex, alpha) {
    const c = hex.replace('#', '');
    const r = parseInt(c.substring(0, 2), 16);
    const g = parseInt(c.substring(2, 4), 16);
    const b = parseInt(c.substring(4, 6), 16);
    return `rgba(${r},${g},${b},${alpha})`;
  }

  _shiftHue(hex, deg) {
    if (!deg) return hex;
    const c = hex.replace('#', '');
    let r = parseInt(c.substring(0, 2), 16) / 255;
    let g = parseInt(c.substring(2, 4), 16) / 255;
    let b = parseInt(c.substring(4, 6), 16) / 255;
    const max = Math.max(r, g, b), min = Math.min(r, g, b);
    let h, s, l = (max + min) / 2;
    if (max === min) { h = s = 0; }
    else {
      const d = max - min;
      s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
      switch (max) {
        case r: h = (g - b) / d + (g < b ? 6 : 0); break;
        case g: h = (b - r) / d + 2; break;
        default: h = (r - g) / d + 4;
      }
      h /= 6;
    }
    h = (h * 360 + deg) % 360 / 360;
    const hue2rgb = (p, q, tc) => {
      if (tc < 0) tc += 1;
      if (tc > 1) tc -= 1;
      if (tc < 1/6) return p + (q - p) * 6 * tc;
      if (tc < 1/2) return q;
      if (tc < 2/3) return p + (q - p) * (2/3 - tc) * 6;
      return p;
    };
    let r2, g2, b2;
    if (s === 0) { r2 = g2 = b2 = l; }
    else {
      const q = l < 0.5 ? l * (1 + s) : l + s - l * s;
      const p = 2 * l - q;
      r2 = hue2rgb(p, q, h + 1/3);
      g2 = hue2rgb(p, q, h);
      b2 = hue2rgb(p, q, h - 1/3);
    }
    const toHex = (v) => Math.round(v * 255).toString(16).padStart(2, '0');
    return `#${toHex(r2)}${toHex(g2)}${toHex(b2)}`;
  }
}

/* -------------------------------------------------------------------------
   Optional: wire the orb to a real microphone using Web Audio API.
   Call connectMic(orb) after a user gesture (mic access requires one).
   ------------------------------------------------------------------------- */
async function connectMic(orb) {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const source = audioCtx.createMediaStreamSource(stream);
  const analyser = audioCtx.createAnalyser();
  analyser.fftSize = 512;
  source.connect(analyser);
  const data = new Uint8Array(analyser.frequencyBinCount);

  function tick() {
    analyser.getByteFrequencyData(data);
    const avg = data.reduce((a, b) => a + b, 0) / data.length;
    orb.setLevel(avg / 255);
    requestAnimationFrame(tick);
  }
  tick();
}

/* ---- demo wiring: delete when embedding in your app ---- */
const orb = new VoiceOrb(document.getElementById('orb-container'));
document.querySelectorAll('.demo button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.demo button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    orb.setState(btn.dataset.state);
  });
});
document.getElementById('level').addEventListener('input', (e) => {
  orb.setLevel(e.target.value / 100);
});
</script>

</body>
</html>
